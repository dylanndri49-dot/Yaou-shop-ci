<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FF6B2B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Yaou Market — Livraison rapide à Yaou et Bonoua, Côte d'Ivoire">
<title>Yaou Market 🛵</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Poppins',sans-serif;background:#111;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #root{width:100%;max-width:430px;height:100svh;background:#F4F4F4;display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 0 80px rgba(0,0,0,0.5);}
  @media(min-width:500px){#root{height:844px;border-radius:40px;margin:20px auto;}}
  .screen{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .scroll::-webkit-scrollbar{display:none;}
  button{cursor:pointer;font-family:'Poppins',sans-serif;border:none;outline:none;}
  input,textarea,select{font-family:'Poppins',sans-serif;outline:none;}

  /* HEADER */
  .hdr{background:#fff;padding:env(safe-area-inset-top,44px) 20px 16px;flex-shrink:0;}
  .hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}

  /* BOTTOM NAV */
  .bnav{background:#fff;border-top:1px solid #f0f0f0;display:flex;justify-content:space-around;padding:10px 0 calc(env(safe-area-inset-bottom,8px) + 10px);flex-shrink:0;}
  .bnav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 10px;transition:color .2s;}
  .bnav-btn span.ic{font-size:22px;}
  .bnav-btn span.lb{font-size:9px;font-weight:500;}
  .bnav-btn.active{color:#FF6B2B!important;}
  .bnav-btn.active span.lb{font-weight:700;}

  /* CARDS */
  .card{background:#fff;border-radius:20px;box-shadow:0 2px 14px rgba(0,0,0,.07);}
  .shop-card{padding:16px;display:flex;gap:14px;cursor:pointer;border-radius:22px;background:#fff;box-shadow:0 2px 14px rgba(0,0,0,.07);margin-bottom:14px;transition:transform .1s;}
  .shop-card:active{transform:scale(.98);}
  .shop-icon{width:66px;height:66px;background:#FFF3E0;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0;}
  .menu-item{background:#fff;border-radius:18px;padding:16px;margin-bottom:10px;display:flex;align-items:center;box-shadow:0 2px 10px rgba(0,0,0,.05);}

  /* BUTTONS */
  .btn-primary{width:100%;padding:16px;background:linear-gradient(135deg,#FF6B2B,#FF3D00);color:#fff;border:none;border-radius:18px;font-weight:800;font-size:16px;cursor:pointer;box-shadow:0 6px 20px rgba(255,107,43,.35);transition:transform .1s,box-shadow .1s;}
  .btn-primary:active{transform:scale(.98);box-shadow:0 3px 10px rgba(255,107,43,.25);}
  .btn-sm{background:#FFF3E0;color:#FF6B2B;border:none;border-radius:14px;padding:8px 16px;font-weight:700;font-size:14px;cursor:pointer;}
  .qty-btn{width:32px;height:32px;border-radius:10px;border:none;background:#f0f0f0;font-weight:700;font-size:18px;display:flex;align-items:center;justify-content:center;}
  .icon-btn{width:40px;height:40px;border-radius:13px;border:none;background:#f5f5f5;font-size:18px;display:flex;align-items:center;justify-content:center;position:relative;}

  /* BADGE */
  .badge{position:absolute;top:-4px;right:-6px;background:#FF6B2B;color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;}

  /* SEARCH */
  .search-bar{background:#f5f5f5;border-radius:16px;padding:12px 16px;display:flex;align-items:center;gap:10px;}
  .search-bar input{border:none;flex:1;font-size:14px;background:transparent;color:#333;}

  /* SPLASH */
  .splash{flex:1;background:linear-gradient(160deg,#FF6B2B,#FF3D00);display:flex;flex-direction:column;align-items:center;justify-content:center;}

  /* BANNER */
  .banner{background:linear-gradient(135deg,#FF6B2B,#FF3D00);border-radius:22px;padding:20px 20px 20px 24px;display:flex;justify-content:space-between;align-items:center;margin:16px 20px 0;}

  /* AUTH */
  .auth-hdr{background:linear-gradient(160deg,#FF6B2B,#FF3D00);padding:env(safe-area-inset-top,50px) 24px 36px;border-bottom-left-radius:32px;border-bottom-right-radius:32px;}
  .auth-input{background:#f5f5f5;border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .auth-input input,.auth-input select{border:none;flex:1;font-size:15px;background:transparent;color:#333;}

  /* TABS */
  .tab-bar{display:flex;margin:24px 24px 0;background:#f5f5f5;border-radius:14px;padding:4px;}
  .tab-btn{flex:1;padding:10px;border-radius:11px;border:none;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;}

  /* CATS */
  .cat-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 20px 4px;scrollbar-width:none;}
  .cat-scroll::-webkit-scrollbar{display:none;}
  .cat-btn{display:flex;flex-direction:column;align-items:center;padding:10px 14px;border-radius:18px;border:none;cursor:pointer;white-space:nowrap;min-width:64px;flex-shrink:0;transition:all .2s;}

  /* PROMO STRIP */
  .promo-strip{display:flex;gap:10px;overflow-x:auto;padding:14px 20px;scrollbar-width:none;}
  .promo-strip::-webkit-scrollbar{display:none;}
  .promo-pill{flex-shrink:0;border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;}

  /* CHAT */
  .chat-bubble{max-width:72%;border-radius:18px;padding:12px 14px;font-size:14px;line-height:1.4;box-shadow:0 2px 8px rgba(0,0,0,.08);}

  /* MAP */
  .fake-map{background:#E8F5E9;border-radius:24px;height:190px;position:relative;overflow:hidden;border:2px solid #C8E6C9;margin-bottom:18px;}
  .map-road-h{position:absolute;width:100%;height:2px;background:rgba(255,255,255,.6);}
  .map-road-v{position:absolute;width:2px;height:100%;background:rgba(255,255,255,.6);}

  @keyframes splash-pop{0%,100%{transform:scale(1) rotate(-3deg)}50%{transform:scale(1.08) rotate(3deg)}}
  @keyframes rider-move{0%{transform:translate(-60px,10px)}50%{transform:translate(20px,-20px)}100%{transform:translate(-60px,10px)}}
  @keyframes dot-pulse{0%,100%{opacity:.4}50%{opacity:1}}
  @keyframes slide-up{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  .anim-up{animation:slide-up .3s ease both;}
</style>
</head>
<body>
<div id="root"></div>

<script>
// ═══════════════════════ DATA ═══════════════════════════════════════════════
const SHOPS=[
  {id:1,cat:"food",name:"Maquis Chez Mariam",desc:"Cuisine ivoirienne authentique",rating:4.8,reviews:312,time:"20-35 min",delivery:300,tag:"⭐ Populaire",tagColor:"#FF6B2B",emoji:"🍲",open:true,promo:"−10% 1ère commande",

  {id:2,cat:"grocery",name:"Marché Central de Yaou",desc:"Fruits, légumes & épicerie locale",rating:4.5,reviews:189,time:"15-25 min",delivery:200,tag:"🟢 Express",tagColor:"#00B894",emoji:"🥦",open:true,promo:null,
   items:[{id:201,name:"Banane plantain (régime)",price:800,emoji:"🍌",pop:true},{id:202,name:"Tomates fraîches (kg)",price:600,emoji:"🍅"},{id:203,name:"Igname (kg)",price:700,emoji:"🥔"},{id:204,name:"Huile de palme (1L)",price:1200,emoji:"🫙",pop:true},{id:205,name:"Piment frais",price:300,emoji:"🌶️"},{id:206,name:"Gombo frais (botte)",price:400,emoji:"🫛"},{id:207,name:"Coco râpé",price:500,emoji:"🥥"}],
   allReviews:[{user:"Adjoua M.",stars:5,text:"Légumes très frais !"},{user:"Yao B.",stars:4,text:"Bon marché, livraison correcte."}]},

   allReviews:[{user:"Fatou D.",stars:5,text:"Le jus d'ananas est incroyable !"}]},
  {id:4,cat:"bakery",name:"Boulangerie du Village",desc:"Pain chaud & viennoiseries",rating:4.3,reviews:74,time:"10-15 min",delivery:100,tag:"⚡ Rapide",tagColor:"#FDCB6E",emoji:"🥐",open:true,promo:null,

   allReviews:[{user:"Marie K.",stars:4,text:"Pain toujours chaud le matin."}]},
  {id:5,cat:"pharma",name:"Pharmacie Espoir Yaou",desc:"Médicaments & produits santé",rating:4.9,reviews:203,time:"25-40 min",delivery:500,tag:"✅ Certifiée",tagColor:"#00CEC9",emoji:"💊",open:true,promo:null,
   items:[{id:501,name:"Paracétamol 500mg",price:600,emoji:"💊",pop:true},{id:502,name:"Moustiquaire imprégnée",price:3500,emoji:"🦟"},{id:503,name:"Sérum physiologique",price:800,emoji:"💉"},{id:504,name:"Masques (x10)",price:500,emoji:"😷"},{id:505,name:"Vitamine C (x30)",price:1200,emoji:"🍊",pop:true}],

  {id:6,cat:"food",name:"Fast-Food Kpakpa",desc:"Brochettes, alloco & grillades",rating:4.4,reviews:156,time:"15-30 min",delivery:250,tag:"🔥 Tendance",tagColor:"#E17055",emoji:"🍢",open:false,promo:null,
   items:[{id:601,name:"Brochette bœuf (x5)",price:1500,emoji:"🍢",pop:true},{id:602,name:"Alloco sauce",price:600,emoji:"🍟",pop:true},{id:603,name:"Poulet grillé entier",price:4000,emoji:"🍗"},{id:604,name:"Poisson braisé",price:2000,emoji:"🐟"}],
   allReviews:[{user:"Gnagna F.",stars:5,text:"Les brochettes sont top !"}]},
  {id:7,cat:"food",name:"Chez Tante Adjoua",desc:"Spécialités du village de Yaou",rating:4.7,reviews:88,time:"25-40 min",delivery:200,tag:"🏡 Local",tagColor:"#2ECC71",emoji:"🫕",open:true,promo:"Livraison offerte >3000F",
   items:[{id:701,name:"Gboma Dessi",price:1800,emoji:"🫕",pop:true},{id:702,name:"Sauce Arachide",price:1500,emoji:"🥜",pop:true},{id:703,name:"Dégué sucré",price:600,emoji:"🥛"},{id:704,name:"Foutou banane",price:1400,emoji:"🍌"}],
   allReviews:[{user:"Evrard Y.",stars:5,text:"Comme chez ma mère !"},{user:"Céleste O.",stars:5,text:"Le gboma dessi est authentique."}]},
  {id:8,cat:"grocery",name:"Épicerie Moderne Yaou",desc:"Produits emballés & conserves",rating:4.2,reviews:52,time:"10-20 min",delivery:150,tag:"🛒 Épicerie",tagColor:"#3498DB",emoji:"🛒",open:true,promo:null,
   items:[{id:801,name:"Riz parfumé (5kg)",price:3500,emoji:"🍚",pop:true},{id:802,name:"Huile végétale (2L)",price:2200,emoji:"🫙"},{id:803,name:"Sucre (1kg)",price:600,emoji:"🍬"},{id:804,name:"Savon de Marseille (x3)",price:900,emoji:"🧼"},{id:805,name:"Boîte de tomates",price:350,emoji:"🥫",pop:true},{id:806,name:"Sardines en boîte",price:500,emoji:"🐟"}],
   allReviews:[{user:"Inès T.",stars:4,text:"Pratique pour les courses rapides."}]},
  {id:9,cat:"drink",name:"Glacière de Bonoua",desc:"Eau glacée & boissons froides",rating:4.4,reviews:63,time:"10-15 min",delivery:100,tag:"🧊 Froid",tagColor:"#00B4D8",emoji:"🧊",open:true,promo:null,
   items:[{id:901,name:"Eau glacée (sachet x20)",price:500,emoji:"💧",pop:true},{id:902,name:"Coca-Cola (33cl)",price:400,emoji:"🥤"},{id:903,name:"Fanta Orange (33cl)",price:400,emoji:"🍊"},{id:904,name:"Malta Guinness",price:500,emoji:"🍺",pop:true}],
   allReviews:[{user:"Serge A.",stars:5,text:"Toujours bien froid, livré vite !"}]},
];
const CATS=[{id:"all",label:"Tout",icon:"🏪"},{id:"food",label:"Restaurants",icon:"🍽️"},{id:"grocery",label:"Marché",icon:"🥬"},{id:"drink",label:"Boissons",icon:"🥤"},{id:"bakery",label:"Boulangerie",icon:"🥖"},{id:"pharma",label:"Pharmacie",icon:"💊"}];
const PAYS=[{id:"orange",label:"Orange Money",icon:"🟠",color:"#FF6600"},{id:"mtn",label:"MTN MoMo",icon:"🟡",color:"#FFCC00"},{id:"wave",label:"Wave",icon:"🔵",color:"#1A73E8"},{id:"cash",label:"Espèces à la livraison",icon:"💵",color:"#27AE60"}];
const RIDERS=["Kouassi A.","Bamba K.","Ama S.","Kouakou E.","Diallo M."];

// ═══════════════════════ STATE ═══════════════════════════════════════════════
let S={
  screen:"splash",
  user:null,
  authTab:"login",
  tab:"home",
  cat:"all",
  shop:null,
  cart:{},
  orders:[],
  activeOrder:null,
  trackStep:1,
  search:"",
  payment:"orange",
  notifs:[{id:1,text:"Bienvenue sur Yaou Market ! 🎉",time:"Maintenant",read:false},{id:2,text:"−10% chez Maquis Chez Mariam aujourd'hui 🛵",time:"Il y a 5 min",read:false}],
  loginPhone:"",loginPass:"",
  regName:"",regPhone:"",regPass:"",
  riderName:"",riderPhone:"",riderZone:"",riderMoto:"non",riderDone:false,
  chat:[{from:"rider",text:"Bonjour ! Je suis en route vers vous 🛵",time:"14:32"}],
  chatInput:"",
  loyalty:{points:150,level:"Bronze"},
  reviewShop:null,
  reviewStars:5,reviewText:"",
  shopReviews:{},
  trackInterval:null,
};

function setState(patch){Object.assign(S,patch);render();}

// ═══════════════════════ HELPERS ════════════════════════════════════════════
function cartItems(){return Object.entries(S.cart).map(([id,qty])=>{for(const sh of SHOPS){const it=sh.items.find(i=>i.id===+id);if(it)return{...it,qty};}return null;}).filter(Boolean);}
function cartTotal(){return cartItems().reduce((s,i)=>s+i.price*i.qty,0);}
function cartCount(){return Object.values(S.cart).reduce((a,b)=>a+b,0);}
function unreadCount(){return S.notifs.filter(n=>!n.read).length;}
function fmt(n){return n.toLocaleString("fr-FR");}
function timeNow(){return new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});}

function addItem(id){const c={...S.cart};c[id]=(c[id]||0)+1;setState({cart:c});}
function removeItem(id){const c={...S.cart};if(c[id]>1)c[id]--;else delete c[id];setState({cart:c});}

function placeOrder(){
  const ci=cartItems();const ct=cartTotal();const df=S.shop?.delivery||300;
  const pts=Math.floor((ct+df)/100);
  const order={id:Date.now(),shopName:S.shop?.name||"Yaou Market",shopEmoji:S.shop?.emoji||"🛵",items:ci,total:ct+df,delivery:df,payment:PAYS.find(p=>p.id===S.payment),rider:RIDERS[Math.floor(Math.random()*RIDERS.length)],status:"En cours",date:new Date().toLocaleString("fr-FR",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})};
  if(S.trackInterval)clearInterval(S.trackInterval);
  const iv=setInterval(()=>{if(S.trackStep>=3){clearInterval(iv);return;}setState({trackStep:S.trackStep+1});},4000);
  setState({orders:[order,...S.orders],activeOrder:order,cart:{},trackStep:1,trackInterval:iv,loyalty:{points:S.loyalty.points+pts,level:S.loyalty.points+pts<200?"Bronze":S.loyalty.points+pts<500?"Argent":S.loyalty.points+pts<1000?"Or":"Platine"},screen:"tracking",notifs:[{id:Date.now(),text:`Commande chez ${order.shopName} confirmée ! +${pts} pts 🎁`,time:"Maintenant",read:false},...S.notifs],chat:[{from:"rider",text:`Bonjour ! Je suis ${order.rider}, en route vers vous 🛵`,time:timeNow()}]});
}

function sendChat(){
  if(!S.chatInput.trim())return;
  const msgs=[...S.chat,{from:"user",text:S.chatInput,time:timeNow()}];
  setState({chat:msgs,chatInput:""});
  setTimeout(()=>{const replies=["D'accord, j'arrive bientôt 🛵","Je suis à 5 minutes !","Votre commande est avec moi 👍","Pas de problème !"];setState({chat:[...S.chat,{from:"rider",text:replies[Math.floor(Math.random()*replies.length)],time:timeNow()}]});},1500);
}

function submitReview(shopId){
  const rev={...S.shopReviews};rev[shopId]=[{user:S.user?.name||"Vous",stars:S.reviewStars,text:S.reviewText,date:"À l'instant"},...(rev[shopId]||[])];
  setState({shopReviews:rev,reviewShop:null,reviewText:"",reviewStars:5,loyalty:{points:S.loyalty.points+10,level:S.loyalty.level},notifs:[{id:Date.now(),text:"Merci pour votre avis ! +10 points 🎁",time:"Maintenant",read:false},...S.notifs]});
}

// ═══════════════════════ RENDER ENGINE ══════════════════════════════════════
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)for(const[k,v]of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else if(k==="htmlFor")el.htmlFor=v;
    else if(k==="checked")el.checked=v;
    else if(k==="value"&&(tag==="input"||tag==="textarea"||tag==="select")){el.value=v;}
    else el.setAttribute(k,v);
  }
  for(const c of children.flat(10)){if(c==null||c===false)continue;el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);}
  return el;
}
function div(s,...c){return h("div",{style:s},...c);}
function span(s,...c){return h("span",{style:s},...c);}
function btn(s,ev,...c){return h("button",{style:s,onClick:ev},...c);}
function txt(tag,s,...c){return h(tag,{style:s},...c);}

// ═══════════════════════ COMPONENTS ═════════════════════════════════════════

function BottomNav(){
  const tabs=[{id:"home",icon:"🏠",label:"Accueil"},{id:"cart",icon:"🛒",label:"Panier",badge:cartCount()},{id:"chat",icon:"💬",label:"Chat"},{id:"orders",icon:"📦",label:"Commandes"},{id:"profile",icon:"👤",label:"Profil",badge:unreadCount()}];
  return h("div",{className:"bnav"},
    ...tabs.map(t=>{
      const active=S.tab===t.id;
      const b=btn({color:active?"#FF6B2B":"#bbb"},()=>{setState({shop:null,tab:t.id});},
        div({position:"relative",display:"inline-flex"},
          span(null,t.icon),
          t.badge>0?h("span",{className:"badge"},t.badge):null
        ),
        h("span",{className:"lb"},t.label)
      );
      b.className="bnav-btn"+(active?" active":"");
      return b;
    })
  );
}

function SearchBar(){
  const inp=h("input",{type:"search",placeholder:"Chercher un commerce, un plat...",value:S.search});
  inp.addEventListener("input",e=>setState({search:e.target.value}));
  return div({padding:"0 20px 12px"},
    div({className:"search-bar"},span(null,"🔍"),inp)
  );
}

function ShopCard(shop){
  return h("div",{className:"shop-card",onClick:()=>setState({shop})},
    div({className:"shop-icon"},shop.emoji),
    div({flex:1,minWidth:0},
      div({display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8},
        h("b",{style:{color:"#1a1a2e",fontSize:15,flex:1}},shop.name),
        !shop.open?h("span",{style:{fontSize:10,background:"#f0f0f0",color:"#999",padding:"3px 8px",borderRadius:20,fontWeight:600,flexShrink:0}},"FERMÉ"):null
      ),
      div({color:"#888",fontSize:12,marginTop:3},shop.desc),

  return wrap;
}

// ═══════════════════════ MAIN RENDER ════════════════════════════════════════
function renderToDOM(){
  const root=document.getElementById("root");
  root.innerHTML="";
  let view;
  if(S.screen==="splash")view=renderSplash();
  else if(S.screen==="auth")view=renderAuth();
  else if(S.screen==="tracking")view=renderTracking();
  else{
    // App
    if(S.reviewShop){view=renderReview();}
    else if(S.shop){view=renderShop();}
    else if(S.tab==="home")view=renderHome();
    else if(S.tab==="cart")view=renderCart();
    else if(S.tab==="chat")view=renderChat();
    else if(S.tab==="orders")view=renderOrders();
    else if(S.tab==="loyalty")view=renderLoyalty();
    else if(S.tab==="rider")view=renderRider();
    else if(S.tab==="notifs")view=renderNotifs();
    else if(S.tab==="profile")view=renderProfile();
    else view=renderHome();
  }
  if(view)root.appendChild(view);
}

function render(){renderToDOM();}

// Start
render();
</script>
</body>
</html>
